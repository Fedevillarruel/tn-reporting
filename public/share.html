<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reporte Compartido</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <p class="chip">Shared Report</p>
        <h1 id="title">Reporte protegido</h1>
      </header>

      <section class="card">
        <form id="accessForm" class="stack">
          <label>
            Clave del reporte
            <input id="password" required placeholder="Ingresa la clave" />
          </label>
          <button type="submit">Ver reporte</button>
        </form>
        <p id="status" class="status"></p>
      </section>

      <section class="card" id="reportBox" hidden>
        <div class="kpi-grid">
          <article>
            <p>Pedidos</p>
            <strong id="orders">0</strong>
          </article>
          <article>
            <p>Items</p>
            <strong id="items">0</strong>
          </article>
          <article>
            <p>Facturacion</p>
            <strong id="revenue">$0.00</strong>
          </article>
        </div>

        <h2>Top productos</h2>
        <ul id="products" class="product-list"></ul>

        <a id="pdfBtn" class="btn-link" target="_blank" rel="noreferrer">Abrir PDF</a>
      </section>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const slug = params.get("slug");
      const token = params.get("token");
      const accessForm = document.getElementById("accessForm");
      const statusEl = document.getElementById("status");
      const reportBox = document.getElementById("reportBox");
      let pollTimer;
      let currentPassword = "";

      function reportApiPath() {
        if (token) {
          return `/api/reports/token/${encodeURIComponent(token)}`;
        }
        if (slug) {
          return `/api/reports/${encodeURIComponent(slug)}`;
        }
        return "";
      }

      function reportPdfPath() {
        if (token) {
          return `/api/reports/token/${encodeURIComponent(token)}/pdf`;
        }
        if (slug) {
          return `/api/reports/${encodeURIComponent(slug)}/pdf`;
        }
        return "";
      }

      function render(summary) {
        document.getElementById("orders").textContent = summary.orders;
        document.getElementById("items").textContent = summary.items;
        document.getElementById("revenue").textContent = `$${Number(summary.revenue).toFixed(2)}`;

        const list = document.getElementById("products");
        list.innerHTML = "";
        for (const p of summary.byProduct.slice(0, 20)) {
          const li = document.createElement("li");
          li.textContent = `${p.product_name} | ${p.quantity}u | $${Number(p.revenue).toFixed(2)}`;
          list.appendChild(li);
        }
      }

      async function refreshReport() {
        const basePath = reportApiPath();
        if (!basePath || !currentPassword) {
          return;
        }

        const response = await fetch(`${basePath}?password=${encodeURIComponent(currentPassword)}`);
        if (!response.ok) {
          statusEl.textContent = "No se pudo actualizar el reporte";
          return;
        }

        const data = await response.json();
        document.getElementById("title").textContent = data.report.name;
        render(data.summary);
        statusEl.textContent = "Actualizado";
      }

      accessForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const basePath = reportApiPath();
        if (!basePath) {
          statusEl.textContent = "Falta token o slug del reporte en la URL";
          return;
        }

        currentPassword = document.getElementById("password").value;
        const response = await fetch(`${basePath}?password=${encodeURIComponent(currentPassword)}`);

        if (!response.ok) {
          statusEl.textContent = "Clave incorrecta o reporte invalido";
          return;
        }

        const data = await response.json();
        document.getElementById("title").textContent = data.report.name;
        render(data.summary);
        reportBox.hidden = false;

        const pdfBtn = document.getElementById("pdfBtn");
        pdfBtn.href = `${reportPdfPath()}?password=${encodeURIComponent(currentPassword)}`;

        if (pollTimer) {
          window.clearInterval(pollTimer);
        }

        statusEl.textContent = "Reporte cargado. Actualizando cada 15 segundos";
        pollTimer = window.setInterval(refreshReport, 15000);
      });
    </script>
  </body>
</html>
